monitor:
  poll_interval_seconds: 1

state_store_dir: "./state"

local_client:
  class_name: LocalCommandClient

jobs:
  - job_id: job1
    registration:
      class_name: LocalJob
      name: job1
      command: ["bash", "./job1.sh"]
      log_path: "job1_%j.log"
      log_path_current: "job1_latest.log"
      log_events:
        - name: ready
          pattern: READY
          pattern_type: substring
          action:
            class_name: LogAction
            message: "job {job_name} is ready"
        - name: oom
          pattern: "CUDA out of memory"
          pattern_type: substring
          action:
            class_name: RestartAction
            reason: "oom - restarting job"
        - name: checkpoint_saved
          pattern: "Checkpoint saved: (\\d+)"
          pattern_type: regex
          extract_groups:
            iteration: 1
          action:
            class_name: LogAction
            message: "Checkpoint {iteration} saved"
  - job_id: job2
    registration:
      class_name: LocalJob
      name: job2
      command: ["bash", "./job2.sh"]
      log_path: "job2_%j.log"
      log_path_current: "job2_latest.log"
      start_condition:
        class_name: CompositeCondition
        mode: all
        conditions:
          - class_name: FileExistsCondition
            path: "./ready.txt"
            persistent_pass: true
          - class_name: TimeoutCondition
            timeout_seconds: 600
      finish_condition:
        class_name: FileContentCondition
        path: "./done.txt"
        pattern: "DONE"
        mode: contains
      log_events:
        - name: finish_early
          pattern: "FINISH NOW"
          pattern_type: substring
          action:
            class_name: FinishAction
            reason: "early completion requested"
        - name: cancel
          pattern: "CANCEL JOB"
          pattern_type: substring
          action:
            class_name: CancelAction
            reason: "user requested cancellation"
