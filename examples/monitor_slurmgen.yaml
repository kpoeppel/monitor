monitor:
  poll_interval_seconds: 30

state_store_dir: "./state"

slurm_client:
  class_name: SlurmClient
  base_client:
    class_name: FakeSlurmClient

jobs:
  - job_id: train
    registration:
      class_name: SlurmJob
      name: train
      command: ["python", "train.py"]
      log_path: "./slurm_out/logs/train_%j.log"
      # log_path_current points to the latest resolved log file (symlink updated on submit)
      log_path_current: "./slurm_out/logs/train_latest.log"
      slurm:
        # SlurmConfig requires template_path/script_dir/log_dir
        template_path: "./templates/job.sbatch"
        script_dir: "./slurm_out/scripts"
        log_dir: "./slurm_out/logs"
        command: ["python", "train.py", "--profile=fast"]
        sbatch:
          partition: gpu
          time: "0-04:00:00"
          gres: "gpu:1"
      log_events:
        - name: oom
          pattern: "CUDA out of memory"
          pattern_type: substring
          action:
            class_name: RestartAction
            reason: "oom - restarting Slurm job"
          condition:
            class_name: MaxAttemptsCondition
            max_attempts: 3
        - name: checkpoint
          pattern: "Checkpoint saved: epoch (\\d+)"
          pattern_type: regex
          extract_groups:
            epoch: 1
          action:
            class_name: LogAction
            message: "Training checkpoint at epoch {epoch}"
